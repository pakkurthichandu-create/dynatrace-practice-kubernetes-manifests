apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: dynatrace-lab
  labels:
    app: eureka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
      - name: eureka
        image: chandu4440/discovery-server:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 8761
        env:
        - name: ERROR_RATE
          value: "0.15"
        - name: MIN_LATENCY_MS
          value: "10"
        - name: MAX_LATENCY_MS
          value: "800"
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms64m -Xmx128m"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
