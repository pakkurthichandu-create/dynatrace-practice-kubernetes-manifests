apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-website
  namespace: dynatrace-lab
  labels:
    app: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
      - name: website
        image: chandu4440/main-website:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: ORDERS_BASE_URL
          value: http://catalog-service
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1024Mi"
            cpu: "500m"
