apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-ui
  namespace: dynatrace-lab
  labels:
    app: todo-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-ui
  template:
    metadata:
      labels:
        app: todo-ui
    spec:
      containers:
      - name: website
        image: chandu4440/main-website:v6
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: ORDERS_BASE_URL
          value: http://todo-backend
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms64m -Xmx128m"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
